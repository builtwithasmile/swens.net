<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" role="img" aria-label="Placeholder: an open road to the horizon">
  <defs>
    <linearGradient id="hSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2417"/>
      <stop offset="0.55" stop-color="#3a3320"/>
      <stop offset="1" stop-color="#1c2a1d"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="624" height="444" rx="24" fill="url(#hSky)" stroke="#e6c15a" stroke-opacity="0.30"/>
  <!-- low sun on the horizon -->
  <circle cx="320" cy="250" r="64" fill="#e6c15a" fill-opacity="0.9"/>
  <rect x="8" y="250" width="624" height="6" fill="#e6c15a" fill-opacity="0.25"/>
  <!-- land -->
  <path d="M8 256 L632 256 L632 452 L8 452 Z" fill="#20301f"/>
  <!-- road receding to the horizon -->
  <path d="M250 452 L312 256 L328 256 L390 452 Z" fill="#33402a"/>
  <!-- dashes on the road -->
  <g fill="#e6c15a" fill-opacity="0.7">
    <rect x="316" y="270" width="8" height="16"/>
    <rect x="314" y="306" width="12" height="20"/>
    <rect x="311" y="350" width="18" height="26"/>
    <rect x="306" y="404" width="28" height="34"/>
  </g>
  <!-- a signpost, open question -->
  <line x1="470" y1="452" x2="470" y2="300" stroke="#6b5d3a" stroke-width="8" stroke-linecap="round"/>
  <rect x="470" y="300" width="92" height="40" rx="6" fill="#cdb27a"/>
  <text x="516" y="328" font-family="Georgia, serif" font-size="28" fill="#2a2417" text-anchor="middle">?</text>
  <!-- distant hills -->
  <path d="M8 256 Q140 224 300 250 T632 244 L632 256 L8 256 Z" fill="#3a3320" fill-opacity="0.6"/>
</svg>
