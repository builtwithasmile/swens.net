      <stop offset="0" stop-color="#243a2c"/>
      <stop offset="1" stop-color="#2c4534"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="624" height="444" rx="24" fill="url(#jSky)" stroke="#5ea37d" stroke-opacity="0.35"/>
  <!-- sun -->
