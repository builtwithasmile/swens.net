<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" role="img" aria-label="Placeholder: a small-town computer shop">
  <defs>
    <linearGradient id="sSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26323b"/>
      <stop offset="1" stop-color="#1b2630"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="624" height="444" rx="24" fill="url(#sSky)" stroke="#7d8a7f" stroke-opacity="0.30"/>
  <!-- ground -->
  <rect x="8" y="372" width="624" height="80" rx="0" fill="#222d28"/>
  <!-- storefront facade -->
  <rect x="150" y="150" width="340" height="222" fill="#2c3a39"/>
  <!-- sign board -->
  <rect x="150" y="120" width="340" height="40" rx="6" fill="#3a4a47"/>
  <g fill="#9fb0a3">
    <rect x="176" y="135" width="120" height="10" rx="5"/>
    <rect x="312" y="135" width="60" height="10" rx="5"/>
  </g>
  <!-- striped awning -->
  <g>
    <rect x="142" y="160" width="356" height="30" fill="#5a8c6a" fill-opacity="0.85"/>
    <g fill="#3a4a47" fill-opacity="0.6">
      <rect x="142" y="160" width="44" height="30"/>
      <rect x="230" y="160" width="44" height="30"/>
      <rect x="318" y="160" width="44" height="30"/>
      <rect x="406" y="160" width="44" height="30"/>
    </g>
  </g>
  <!-- window with a glowing CRT inside -->
  <rect x="176" y="210" width="150" height="130" rx="6" fill="#16242d"/>
  <rect x="210" y="250" width="80" height="58" rx="6" fill="#3a4a57"/>
  <rect x="222" y="262" width="56" height="34" rx="3" fill="#6b8cae" fill-opacity="0.7"/>
  <rect x="236" y="308" width="28" height="10" fill="#2c3a47"/>
  <!-- door -->
  <rect x="360" y="232" width="96" height="140" rx="4" fill="#1b2a2b"/>
  <rect x="372" y="250" width="72" height="70" rx="4" fill="#2c3a3a"/>
  <circle cx="438" cy="306" r="4" fill="#9fb0a3"/>
  <!-- OPEN sign -->
  <rect x="378" y="338" width="60" height="20" rx="4" fill="#5a8c6a"/>
  <g fill="#16242d"><rect x="386" y="345" width="44" height="6" rx="3"/></g>
</svg>
